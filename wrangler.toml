name = "createos-sandbox-ghar"
main = "src/index.ts"
compatibility_date = "2026-07-01"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "COORDINATOR"
class_name = "Coordinator"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Coordinator"]

[triggers]
crons = ["*/5 * * * *"]

[vars]
GITHUB_ORG = "NodeOps-app"
CREATEOS_BASE_URL = "https://api.sb.createos.sh"
RUNNER_LABEL = "createos"
RUNNER_TEMPLATE = "ghar-runner"
SANDBOX_NAME_PREFIX = "gha-ci"
RUNNER_SHAPE = "s-4vcpu-4gb"
# Shapes below this are discovered from /v1/shapes but never offered as runner
# labels: an Actions runner needs ~2 GiB to check out and build anything.
MIN_RUNNER_MEM_MIB = "2048"
RUNNER_DISK_MIB = "30720"
MAX_CONCURRENT = "50"
PROVISION_POLICY = "org-wide"
REPO_ALLOWLIST = ""
# GitHub runner group the JIT runner registers into. 1 = the org-wide "Default"
# group. PROVISION_POLICY/REPO_ALLOWLIST only decide which repos we spend a VM
# on; which repos may schedule onto the runner is the GROUP's GitHub policy, not
# ours. To make the allowlist an actual execution boundary, create a runner
# group whose policy scopes it to those repos (org Actions settings) and set
# this to its id.
RUNNER_GROUP_ID = "1"
REAPER_MAX_AGE_MS = "1800000"
RECONCILE_GRACE_MS = "180000"
# Max GitHub subrequests the 5-min recovery scan may spend before it defers the
# rest to the next tick (cursor-resumed). Caps the O(installed-repos) read fan-out
# under the Free-plan 50-subrequest cap; the reaper/orphan sweeps keep their own
# mutation caps. Raise once installed repos routinely exceed ~budget/2.
RECOVERY_SUBREQUEST_BUDGET = "30"
# Multi-tenancy master switch. "single" = pre-tenant behavior. Flipping to
# "multi" is the Plan 3 cutover — do not flip without the cutover runbook.
TENANCY_MODE = "single"
# Per-VM egress quota for community tenants (bytes). 100 GB.
COMMUNITY_VM_BANDWIDTH_BYTES = "107374182400"
APPLY_FORM_URL = ""

# Secrets are set via `wrangler secret put` (never commit values here):
# wrangler secret put GITHUB_APP_ID
# wrangler secret put GITHUB_INSTALLATION_ID
# wrangler secret put GITHUB_APP_PRIVATE_KEY   # paste full PKCS#8 PEM
# wrangler secret put GITHUB_WEBHOOK_SECRET
# wrangler secret put CREATEOS_API_KEY

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
# Head-based: a sampled invocation keeps ALL its logs, else none. 0.25 halves
# log-event volume against the Free-plan 200k/day cap (invocation_logs below logs
# every webhook + 288 crons/day). Trade-off: a budget-bound recovery warn is
# sampled too, but a real bind is persistent (binds every tick until the budget
# is raised), so it still surfaces within a few ticks. Raise temporarily when
# capturing a spawn-latency measurement.
head_sampling_rate = 0.25
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 0.5
