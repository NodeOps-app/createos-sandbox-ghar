name: ghar-test

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: [createos]
    steps:
      - name: Identify the runner
        run: |
          echo "hello from createos microVM"
          echo "host: $(hostname)"
          echo "user: $(whoami)"
          echo "kernel: $(uname -a)"
          echo "cpus: $(nproc)   mem: $(free -h | awk '/Mem:/{print $2}')"
      - name: Prove network egress
        run: |
          curl -fsS https://api.github.com/zen && echo

      # The microVM has no init, so dockerd is started by start-runner.sh. If that
      # ever regresses, every one of these fails with "Cannot connect to the Docker
      # daemon" — which is exactly the breakage this job exists to catch.
      - name: Prove the Docker daemon is up
        run: |
          docker version
          docker buildx version
          docker compose version
          docker run --rm hello-world

      - name: Prove buildx can build an image
        run: |
          printf 'FROM alpine:3.21\nRUN echo baked > /proof\n' > Dockerfile.smoke
          docker buildx build -f Dockerfile.smoke -t ghar-smoke:latest --load .
          test "$(docker run --rm ghar-smoke:latest cat /proof)" = "baked"

  smoke-services:
    runs-on: [createos]
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
    steps:
      - name: Prove service containers work
        run: |
          sudo apt-get update -qq && sudo apt-get install -y --no-install-recommends redis-tools
          test "$(redis-cli -h 127.0.0.1 -p 6379 ping)" = "PONG"

  # The template ships no language runtimes on purpose — every repo pins its own version,
  # so the toolchains arrive at job time via setup-* / asdf. This job is the contract test
  # for that bet: it fails if the microVM ever loses the substrate those installers need
  # (/dev/fd for asdf's checksum, /dev/shm for shared memory, a C toolchain for cgo, and a
  # tool cache at the path setup-python's RUNPATH is hard-linked to).
  smoke-toolchain:
    runs-on: [createos]
    steps:
      - name: Prove the ubuntu-latest baseline is present
        run: |
          for b in gh gcc g++ make python3 wget zip bzip2 zstd file unzip xz jq openssl ssh git; do
            command -v "$b" >/dev/null || { echo "missing from template: $b"; exit 1; }
          done
          gh --version | head -1

      # Without /dev/fd this dies with "sha256sum: /dev/fd/63: No such file or directory",
      # which is how asdf's golang plugin failed before start-runner.sh symlinked it.
      - name: Prove process substitution and /dev/shm work
        run: |
          test "$(cat <(echo ok))" = ok
          diff <(echo same) <(echo same)
          python3 -c "import multiprocessing as mp; q = mp.Queue(); q.put('shm'); assert q.get() == 'shm'"

      - name: Prove gh is authenticated against the API
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api /rate_limit --jq '.rate.limit'

      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
      - name: Prove cgo and the race detector work
        run: |
          mkdir -p /tmp/cgo && cd /tmp/cgo
          go mod init smoke >/dev/null
          printf 'package smoke\n\n/*\n#include <stdlib.h>\n*/\nimport "C"\n\nfunc Nothing() { _ = C.int(0) }\n' > smoke.go
          printf 'package smoke\n\nimport "testing"\n\nfunc TestSmoke(t *testing.T) { Nothing() }\n' > smoke_test.go
          CGO_ENABLED=1 go test -race ./...

      # setup-python only resolves because start-runner.sh makes the box claim Ubuntu 22.04
      # (see the Dockerfile). Assert the whole chain: the action must resolve a version, and
      # the interpreter it drops must actually load libpython — which only happens if
      # RUNNER_TOOL_CACHE matches the RUNPATH those binaries were linked against. The org
      # asks for 3.11, 3.12 and 3.13, so prove the span rather than one lucky version.
      - uses: actions/setup-python@v6
        with:
          python-version: |
            3.11
            3.12
            3.13
      - name: Prove setup-python's interpreters can actually load libpython
        run: |
          for v in 3.11 3.12 3.13; do
            py="$(command -v python$v)"
            "$py" -VV
            "$py" -c "import ssl, sqlite3, ctypes, lzma; print('stdlib ok')"
          done

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"
      - run: bun --version

      - uses: asdf-vm/actions/install@v4
        with:
          tool_versions: golang 1.26.3
      - run: go version

  # Every shape the worker will actually hand out: the bare `createos` label (whose
  # shape comes from RUNNER_SHAPE, today s-4vcpu-4gb) plus every catalog shape that
  # clears the runner floor (mem_mib >= MIN_RUNNER_MEM_MIB, no cpu_quota_pct). The
  # sub-floor shapes (s-1vcpu-256mb, s-0.25vcpu-512mb, s-0.5vcpu-1gb, s-1vcpu-1gb)
  # are denied at label admission, so a job can never land on one. Add a row here
  # when the catalog grows a shape — an unlisted shape is an untested shape.
  smoke-shaped:
    strategy:
      fail-fast: false
      matrix:
        label:
          - createos # bare label -> RUNNER_SHAPE
          - createos-1vcpu-2gb
          - createos-2vcpu-2gb
          - createos-2vcpu-4gb
          - createos-4vcpu-4gb
          - createos-4vcpu-8gb
          - createos-8vcpu-8gb
          # createos-8vcpu-16gb excluded: CreateOS returns 5xx "internal error"
          # provisioning the largest shape under the simultaneous-spawn burst,
          # cancelling the job (first seen run 29654684165, 4 consecutive failures).
          # Re-add once shape-aware capacity (C4) paces big-shape provisioning — until
          # then it flakes the smoke without exercising any controller code path.
    name: smoke-shaped (${{ matrix.label }})
    runs-on: ${{ matrix.label }}
    steps:
      - name: Identify the runner
        run: |
          echo "label: ${{ matrix.label }}"
          echo "host: $(hostname)"
          echo "cpus: $(nproc)   mem: $(free -h | awk '/Mem:/{print $2}')"
          echo "disk: $(df -h / | awk 'NR==2{print $2" total, "$4" free"}')"
