name: selftest-createos
# Manual end-to-end check: provisions a createos microVM runner and exercises
# the self-delete teardown fast path. Trigger with `gh workflow run`.
on:
  workflow_dispatch:

jobs:
  selftest:
    runs-on: [createos]
    steps:
      - name: Prove we are on a createos runner
        run: |
          echo "runner=${RUNNER_NAME:-?} host=$(hostname)"
          uname -a
          echo "self-signal endpoint present?"
          curl -sS -o /dev/null -w 'self/pause=%{http_code}\n' http://127.0.0.1:1029/self/pause || true
          sleep 5
          echo "selftest done"
